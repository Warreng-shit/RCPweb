<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            background: linear-gradient(grey,darkgrey,grey);
            font-family: 'Inter', 'Open Sans', Arial, sans-serif;
        }
        fieldset{
            padding: 15px;
            margin-bottom: 15px;
            background-color: rgba(155, 125, 125, 0.493);

        }
        .row{
            margin-bottom:3;
        }
        .border{
            padding: 5;
            margin-bottom: 3;
            border-radius: 15px;
            
        }
        legend{
            width: auto;
        }
        .container{
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="index.html">
            <fieldset class="border  ">
                <legend>Personal Information</legend>
                <!-- reminder for -->
                <div class="form-row ">
                    <div class="col">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="First Name"required>
                    </div>

                    <div class="col">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>
                <!-- reminder for email and password -->
                <div class="row ">
                    <div class="col">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="example@email.com"required>
                    </div>
                    <div class="col">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password"required>
                    </div>
                </div>
                <!-- reminder for date and number -->
                <div class="row ">
                    <div class="col">
                        <label for="dates" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="dates"required>
                    </div>
                    <div class="col">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phone" placeholder="123-456-7890">
                    </div>
                </div>
            </fieldset>
            <!-- reminder for buttons -->
            <fieldset class="border ">
                <legend>Cooking Level</legend>
                    <div>
                    <input  type="radio" name="cookingLevel" id="beginner" value="Beginner">
                    <label  for="beginner">Beginner</label>
                
                
                    <input type="radio" name="cookingLevel" id="intermediate"
                        value="Intermediate">
                    <label for="intermediate">Intermediate</label>
                
                
                    <input type="radio" name="cookingLevel" id="professional"
                        value="Professional">
                    <label for="professional">Professional</label>
                    </div>
            </fieldset>
            <!-- reminder for idk feedbacks blah blah blah  -->
            <fieldset class="border  ">
                <legend>Biography</legend>
                <div class="">
                    <label for="bio" class="form-label">Chef Biography</label>
                    <textarea class="form-control" id="bio" rows="3"
                        placeholder="Tell us about your culinary journey..."></textarea>
                </div>  
            </fieldset>
            <button type="submit" class="btn btn-success">Register Account</button>
            <button type="reset" class="btn btn-secondary">Clear Form</button>
        </form>
    </div>
</body>

</html>
